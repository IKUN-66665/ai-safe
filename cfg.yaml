# AI杀毒配置

ai:
  provider: "ollama"
  
  ollama:
    host: "http://localhost:11434"
    model: "deepseek-r1:7b"
    temperature: 0.1
    max_tokens: 4096

  openai:
    api_key: ""
    model: "gpt-4"
    temperature: 0.1

av:
  max_size: 104857600
  supported_ext:
    - ".exe"
    - ".dll"
    - ".sys"
    - ".scr"
    - ".bat"
    - ".cmd"
    - ".ps1"
    - ".vbs"
    - ".js"
    - ".jar"
    - ".py"
    - ".sh"

  code_extract:
    max_str: 1000
    min_str_len: 4
    extract_imports: true
    extract_secs: true
    calc_ent: true

  prompt: |

    分析文件是否为恶意软件。注意：大部分软件是安全的，不要轻易判为中高风险。

    正常软件特征（看到直接判安全，0-20分）：
    - 文件名包含：chrome、wechat、qq、firefox、edge、vscode、notepad++、7z、winrar、steam等
    - 常见软件路径：Program Files、Program Files (x86)、Windows\System32等
    - 正常的网络操作（HTTP请求、socket连接）是正常行为
    - 正常的注册表读写（配置存储）是正常行为
    - 正常的文件操作（读写配置、缓存）是正常行为

    真正的恶意特征（满足才判高风险）：
    - 下载并执行远程代码
    - 键盘记录、屏幕截图窃取信息
    - 进程注入、内存篡改
    - 加密文件勒索
    - 挖矿行为
    - 隐藏自身、持久化后门

    评分标准（严格按此执行）：
    - 0-20分：安全（正常软件，如Chrome、微信等）
    - 21-40分：低风险（可能有可疑API但无明显恶意）
    - 41-60分：中风险（有明显可疑行为但不确定）
    - 61-80分：高风险（确认恶意特征）
    - 81-100分：极高风险（严重恶意）

    重要：如果没有明确的恶意行为，一律判为低风险或安全，不要过度敏感！

    返回JSON格式：
    {
      "is_malicious": false,
      "risk_level": "low",
      "risk_score": 15,
      "threat_type": "normal",
      "indicators": [],
      "behavior_analysis": "正常软件行为",
      "recommendation": "安全"##
    }

log:
  level: "INFO"
  file: "logs/av.log"
  max_size: 10485760
  backup: 5
